<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MIPT Prompts CTF{% endblock %}</title>
  <meta name="description" content="MIPT Prompts CTF - тренажёр атак prompt injection на языковые модели.">
  <link rel="stylesheet" href="/static/site.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="/">MIPT Prompts CTF</a>
  </div>
  <nav class="topnav">
    <a href="/leaderboard">Лидерборд</a>
    {% if user %}
      <a href="/profile">{{ user.nickname }}</a>
      <form action="/auth/logout" method="post" class="logout-form">
        <button type="submit">Выйти</button>
      </form>
    {% else %}
      <a href="/auth/login">Войти</a>
      <a href="/auth/register" class="cta">Регистрация</a>
    {% endif %}
  </nav>
</header>

<main class="content">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <span>Код проекта: <a href="https://github.com/FGPy-cmpsc/NetworkProject" target="_blank" rel="noopener">github.com/FGPy-cmpsc/NetworkProject</a></span>
</footer>
</body>
</html>
