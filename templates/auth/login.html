{% extends "base.html" %}
{% block content %}
<h1>Вход</h1>
{% if error %}<p class="err">{{ error }}</p>{% endif %}
<form method="post" action="/auth/login" class="form">
  <label>Email
    <input type="email" name="email" required value="{{ values.get('email', '') }}">
  </label>
  <label>Пароль
    <input type="password" name="password" required>
  </label>
  <button type="submit">Войти</button>
</form>
<p>Нет аккаунта? <a href="/auth/register">Регистрация</a></p>
{% endblock %}
